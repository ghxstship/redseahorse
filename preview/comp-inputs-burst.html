<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>html,body{margin:0}.stage{width:700px;background:var(--ink);padding:30px 34px;box-sizing:border-box;display:flex;gap:30px;align-items:center}
.eb{font-family:var(--font-mono);font-size:12px;letter-spacing:.22em;color:var(--brass);text-transform:uppercase;margin:0 0 16px}
.form{flex:1}
.fg{margin-bottom:14px}
.burst-wrap{flex:none;display:grid;place-items:center}
.burst-txt{display:flex;flex-direction:column;line-height:.9}
.burst-txt b{font-size:26px}.burst-txt span{font-size:11px}
</style></head>
<body><div class="stage">
  <div class="form">
    <p class="eb">Inputs</p>
    <div class="fg"><label class="gx-field-label">Your Name</label><input class="gx-input" placeholder="Captain..."></div>
    <div class="fg"><label class="gx-field-label">The Mission</label><input class="gx-input" value="50,000-cap festival stage" style="box-shadow:3px 3px 0 var(--nebula)"></div>
    <a class="gx-btn gx-btn--nebula gx-btn--sm">Send Manifest ↗</a>
  </div>
  <div class="burst-wrap">
    <div class="gx-burst"><span class="burst-txt"><b>OFF</b><span>THE</span><b>CHARTS</b></span></div>
  </div>
</div></body></html>
