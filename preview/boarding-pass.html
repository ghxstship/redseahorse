<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../terminal.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css">
<style>html,body{margin:0}.stage{width:760px;background:var(--ink-2);padding:30px;box-sizing:border-box}
.eb{font-family:var(--font-mono);font-size:12px;letter-spacing:.22em;color:var(--brass);text-transform:uppercase;margin:0 0 18px}
.gx-pass{max-width:none}
</style></head>
<body><div class="stage">
  <p class="eb">Boarding Pass · the client engagement</p>
  <div class="gx-pass">
    <div class="gx-pass__main">
      <div class="gx-pass__brand"><img src="../assets/logo-ghostship-skull.svg" alt="GHXSTSHIP">G H X S T S H I P</div>
      <div class="gx-pass__route">
        <div class="gx-pass__code">MIA<small>Discovery</small></div>
        <i class="ph-bold ph-boat gx-pass__plane"></i>
        <div class="gx-pass__code">LIVE<small>Activation</small></div>
      </div>
      <div class="gx-pass__grid">
        <div class="gx-pass__f"><div class="k">Destination</div><div class="v">Festival</div></div>
        <div class="gx-pass__f"><div class="k">Voyage</div><div class="v">RRR 052</div></div>
        <div class="gx-pass__f"><div class="k">Phase</div><div class="v">07 / 08</div></div>
      </div>
    </div>
    <div class="gx-pass__stub">
      <div class="code">RRR052</div>
      <div class="gx-pass__barcode"></div>
    </div>
  </div>
</div></body></html>
