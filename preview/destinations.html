<!-- @dsCard group="Brand" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../terminal.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css">
<style>html,body{margin:0}.stage{width:760px;background:var(--ink);padding:28px 30px;box-sizing:border-box}
.eb{font-family:var(--font-mono);font-size:12px;letter-spacing:.22em;color:var(--brass);text-transform:uppercase;margin:0 0 16px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.dcard{background:var(--ink-2);border:2px solid var(--ink-3);border-radius:5px;padding:16px 14px}
.code{font-family:var(--font-mono);font-size:9px;letter-spacing:.12em;color:var(--plasma)}
.ic{font-size:24px;color:var(--brass);margin:8px 0 10px;display:block}
.dcard h3{font-family:var(--font-display);font-weight:900;font-size:17px;text-transform:uppercase;margin:0;line-height:.95;color:var(--bone)}
</style></head>
<body><div class="stage">
  <p class="eb">The Destinations · 6 industries we produce for</p>
  <div class="grid">
    <div class="dcard"><span class="code">DEST · FST</span><i class="ph-bold ph-music-notes ic"></i><h3>Festivals</h3></div>
    <div class="dcard"><span class="code">DEST · TUR</span><i class="ph-bold ph-megaphone-simple ic"></i><h3>Concerts &amp; Tours</h3></div>
    <div class="dcard"><span class="code">DEST · ACT</span><i class="ph-bold ph-sparkle ic"></i><h3>Brand Activations</h3></div>
    <div class="dcard"><span class="code">DEST · IMM</span><i class="ph-bold ph-cube ic"></i><h3>Immersive</h3></div>
    <div class="dcard"><span class="code">DEST · SPT</span><i class="ph-bold ph-trophy ic"></i><h3>Sporting Events</h3></div>
    <div class="dcard"><span class="code">DEST · TVF</span><i class="ph-bold ph-television ic"></i><h3>TV, Film &amp; Broadcast</h3></div>
  </div>
</div></body></html>
