<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0}.stage{width:700px;background:var(--void);padding:34px 40px;box-sizing:border-box}
.eb{font-family:var(--font-mono);font-size:12px;letter-spacing:.24em;color:var(--brass);text-transform:uppercase;margin:0 0 6px}
.big{font-family:var(--font-display);font-weight:900;font-size:96px;line-height:.86;color:var(--bone);
  text-transform:uppercase;letter-spacing:-.01em;margin:0}
.row{display:flex;gap:14px;margin-top:14px;flex-wrap:wrap}
.w{font-family:var(--font-display);color:var(--bone);text-transform:uppercase;line-height:1}
.meta{font-family:var(--font-mono);font-size:11px;color:var(--fg-on-dark-3);letter-spacing:.06em;margin-top:18px}
</style></head>
<body><div class="stage">
  <p class="eb">Display · Big Shoulders Display</p>
  <p class="big">VENTURE<br>BEYOND</p>
  <div class="row">
    <span class="w" style="font-weight:400;font-size:30px">Regular</span>
    <span class="w" style="font-weight:600;font-size:30px">Semibold</span>
    <span class="w" style="font-weight:800;font-size:30px">Bold</span>
    <span class="w" style="font-weight:900;font-size:30px;color:var(--brass)">Black</span>
  </div>
  <p class="meta">POSTER + HERO + HEADLINES · UPPERCASE · TRACKING −0.01em</p>
</div></body></html>
