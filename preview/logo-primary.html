<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>
  html,body{margin:0}
  .stage{width:700px;background:var(--void);padding:40px;box-sizing:border-box;
    background-image:var(--halftone-bone);background-size:14px 14px;}
  .stage{background-blend-mode:normal}
  .wrap{background:var(--void);border:3px solid var(--brass);box-shadow:8px 8px 0 var(--brass-deep);padding:36px 40px;}
  .lock{display:flex;align-items:center;gap:26px}
  .mark{width:96px;height:96px;background:var(--ink);border:3px solid var(--brass);display:grid;place-items:center;flex:none}
  .mark img{width:72px;height:72px;image-rendering:pixelated}
  .wm{font-family:var(--font-display);font-weight:900;font-size:54px;line-height:.82;
    letter-spacing:0;color:var(--bone);text-transform:uppercase;margin:0}
  .tag{font-family:var(--font-mono);font-size:13px;letter-spacing:.42em;color:var(--brass);
    text-transform:uppercase;margin:8px 0 0}
  .meta{display:flex;justify-content:space-between;margin-top:26px;align-items:center}
</style></head>
<body><div class="stage"><div class="wrap">
  <div class="lock">
    <div class="mark"><img src="../assets/skull-bone.svg" alt="GHXSTSHIP ghost-ship skull"></div>
    <div>
      <p class="wm">G H X S<br>T S H I P</p>
    </div>
  </div>
  <div class="meta">
    <span class="tag">Venture&nbsp;Beyond</span>
    <span class="gx-coords">MIAMI // LAS VEGAS // CHICAGO // NY // LA</span>
  </div>
</div></div></body></html>
