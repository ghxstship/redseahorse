<!-- @dsCard group="Brand" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../terminal.css">
<style>html,body{margin:0}.stage{width:760px;background:var(--void);padding:28px 30px;box-sizing:border-box}
.eb{font-family:var(--font-mono);font-size:12px;letter-spacing:.22em;color:var(--brass);text-transform:uppercase;margin:0 0 4px}
.sub{font-family:var(--font-mono);font-size:10px;color:var(--fg-on-dark-3);letter-spacing:.04em;margin:0 0 26px}
.gx-smap__name{font-size:12px}.gx-smap__sub{display:none}.gx-smap__dot{width:26px;height:26px;font-size:9px}
/* force horizontal strip-map inside the fixed-width card */
.gx-smap__line{flex-direction:row !important}
.gx-smap__stop{flex-direction:column !important;text-align:center !important;padding:40px 0 0 0 !important;align-items:center !important}
.gx-smap__stop::before{top:16px !important;left:0 !important;width:100% !important;height:6px !important}
.gx-smap__stop:first-child::before{left:50% !important;width:50% !important;height:6px !important}
.gx-smap__stop:last-child::before{width:50% !important;height:6px !important}
.gx-smap__dot{position:absolute !important;top:5px !important;left:50% !important;transform:translateX(-50%) !important}
.gx-smap__name{margin-top:2px !important}
</style></head>
<body><div class="stage">
  <p class="eb">The Itinerary · 8-Phase Production Lifecycle</p>
  <p class="sub">The GHXSTSHIP Line — Discovery to Strike · subway strip-map</p>
  <div class="gx-smap"><div class="gx-smap__line">
    <div class="gx-smap__stop is-terminus"><div class="gx-smap__dot">01</div><div class="gx-smap__name">Discovery</div></div>
    <div class="gx-smap__stop"><div class="gx-smap__dot">02</div><div class="gx-smap__name">Design</div></div>
    <div class="gx-smap__stop"><div class="gx-smap__dot">03</div><div class="gx-smap__name">Advance</div></div>
    <div class="gx-smap__stop"><div class="gx-smap__dot">04</div><div class="gx-smap__name">Procurement</div></div>
    <div class="gx-smap__stop"><div class="gx-smap__dot">05</div><div class="gx-smap__name">Build</div></div>
    <div class="gx-smap__stop"><div class="gx-smap__dot">06</div><div class="gx-smap__name">Install</div></div>
    <div class="gx-smap__stop"><div class="gx-smap__dot">07</div><div class="gx-smap__name">Operate</div></div>
    <div class="gx-smap__stop is-terminus"><div class="gx-smap__dot">08</div><div class="gx-smap__name">Close</div></div>
  </div></div>
</div></body></html>
