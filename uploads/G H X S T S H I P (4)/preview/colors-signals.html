<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0}.stage{width:700px;background:var(--ink);padding:30px 34px;box-sizing:border-box}
.eb{font-family:var(--font-mono);font-size:12px;letter-spacing:.24em;color:var(--brass);text-transform:uppercase;margin:0 0 16px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.sw{height:120px;border-radius:4px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-shadow:5px 5px 0 rgba(0,0,0,.4)}
.n{font-family:var(--font-display);font-weight:900;font-size:22px;text-transform:uppercase;line-height:1}
.hex{font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;margin-top:3px}
.use{font-family:var(--font-body);font-size:11px;margin-top:4px;opacity:.9}
</style></head>
<body><div class="stage">
  <p class="eb">Vertical Signals · one per composition</p>
  <div class="grid">
    <div class="sw" style="background:#22B083"><span class="n" style="color:#06140E">Jade</span><span class="hex" style="color:#06140E">#22B083</span><span class="use" style="color:#06140E">Production · primary</span></div>
    <div class="sw" style="background:#FFC24A"><span class="n" style="color:#1A1405">Pineapple</span><span class="hex" style="color:#1A1405">#FFC24A</span><span class="use" style="color:#1A1405">Operations · energy</span></div>
    <div class="sw" style="background:#2E84D4"><span class="n" style="color:#03101C">Sapphire</span><span class="hex" style="color:#fff">#2E84D4</span><span class="use" style="color:#03101C">Technology · links</span></div>
    <div class="sw" style="background:#F2603A"><span class="n" style="color:#fff">Coral</span><span class="hex" style="color:#fff">#F2603A</span><span class="use" style="color:#fff">Alerts · accent</span></div>
    <div class="sw" style="background:#1E6FA3"><span class="n" style="color:#fff">Harbor</span><span class="hex" style="color:#fff">#1E6FA3</span><span class="use" style="color:#fff">Deep blue accent</span></div>
    <div class="sw" style="background:#14835F"><span class="n" style="color:#fff">Jade-Deep</span><span class="hex" style="color:#fff">#14835F</span><span class="use" style="color:#fff">Shadow / hover</span></div>
  </div>
</div></body></html>
