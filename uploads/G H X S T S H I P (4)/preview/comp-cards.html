<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<style>html,body{margin:0}.stage{width:700px;background:var(--parchment);padding:30px 34px;box-sizing:border-box;display:flex;gap:20px}
.card{flex:1}
.media{height:120px;background:repeating-linear-gradient(45deg,#18262A 0 14px,#101A1B 14px 28px);position:relative;border-bottom:3px solid var(--ink)}
.media .px{position:absolute;left:12px;bottom:10px}
.t{font-family:var(--font-display);font-weight:800;font-size:19px;text-transform:uppercase;color:var(--bone);margin:0 0 4px;line-height:1}
.s{font-family:var(--font-mono);font-size:10px;color:var(--fg-on-dark-3);letter-spacing:.06em;margin:0}
</style></head>
<body><div class="stage">
  <div class="card gx-card">
    <div class="media"><span class="gx-chip-pixel">MUSEUM</span></div>
    <div class="gx-card__body">
      <p class="t">Salvage City Supper Club</p>
      <p class="s">INSOMNIAC // EDC LAS VEGAS // 2024</p>
    </div>
  </div>
  <div class="card gx-panel" style="display:flex;flex-direction:column;justify-content:center">
    <p class="gx-eyebrow" style="margin-bottom:8px">The Tools</p>
    <p style="font-family:var(--font-display);font-weight:800;font-size:26px;text-transform:uppercase;margin:0 0 8px;color:var(--ink);line-height:.95">Built for production at scale</p>
    <p style="font-family:var(--font-body);font-size:13px;color:var(--fg-on-light-2);margin:0">Ink-outlined panel · 4px border · 6px hard shadow.</p>
  </div>
</div></body></html>
