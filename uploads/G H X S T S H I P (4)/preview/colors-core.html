<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0}.stage{width:700px;background:var(--ink);padding:30px 34px;box-sizing:border-box}
.eb{font-family:var(--font-mono);font-size:12px;letter-spacing:.24em;color:var(--brass);text-transform:uppercase;margin:0 0 16px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.sw{height:104px;border:2px solid rgba(255,255,255,.12);border-radius:4px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px}
.n{font-family:var(--font-display);font-weight:800;font-size:16px;text-transform:uppercase;line-height:1}
.hex{font-family:var(--font-mono);font-size:11px;letter-spacing:.04em;margin-top:2px;opacity:.8}
</style></head>
<body><div class="stage">
  <p class="eb">Vintage Reef · Core Ground</p>
  <div class="grid">
    <div class="sw" style="background:#0B1314"><span class="n" style="color:#fff">Void</span><span class="hex" style="color:#fff">#0B1314</span></div>
    <div class="sw" style="background:#101A1B"><span class="n" style="color:#fff">Ink</span><span class="hex" style="color:#fff">#101A1B</span></div>
    <div class="sw" style="background:#18262A"><span class="n" style="color:#fff">Ink-2</span><span class="hex" style="color:#fff">#18262A</span></div>
    <div class="sw" style="background:#243234"><span class="n" style="color:#fff">Ink-3</span><span class="hex" style="color:#fff">#243234</span></div>
    <div class="sw" style="background:#EDF1EF"><span class="n" style="color:#101A1B">Bone</span><span class="hex" style="color:#101A1B">#EDF1EF</span></div>
    <div class="sw" style="background:#EDF1EC"><span class="n" style="color:#101A1B">Pearl-Mist</span><span class="hex" style="color:#101A1B">#EDF1EC</span></div>
    <div class="sw" style="background:#DCE3DE"><span class="n" style="color:#101A1B">Divider</span><span class="hex" style="color:#101A1B">#DCE3DE</span></div>
    <div class="sw" style="background:#76837D"><span class="n" style="color:#fff">Sand-FG</span><span class="hex" style="color:#fff">#76837D</span></div>
  </div>
</div></body></html>
