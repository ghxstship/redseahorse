<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0}.stage{width:700px;background:var(--bone);padding:30px 40px;box-sizing:border-box}
.r{display:flex;align-items:baseline;gap:18px;border-bottom:2px solid var(--parchment-2);padding:7px 0}
.r:last-child{border-bottom:0}
.tag{font-family:var(--font-mono);font-size:11px;color:var(--fg-on-light-3);width:96px;flex:none;letter-spacing:.08em}
.samp{font-family:var(--font-display);font-weight:800;color:var(--ink);text-transform:uppercase;line-height:1}
.px{font-size:11px;color:var(--brass-deep)}
</style></head>
<body><div class="stage">
  <div class="r"><span class="tag">DISPLAY-XL 112</span><span class="samp" style="font-size:46px">Beyond the Scene</span></div>
  <div class="r"><span class="tag">DISPLAY-L 72</span><span class="samp" style="font-size:38px">Venture Beyond</span></div>
  <div class="r"><span class="tag">DISPLAY-M 48</span><span class="samp" style="font-size:30px">Destinations</span></div>
  <div class="r"><span class="tag">H1 40</span><span class="samp" style="font-size:26px">The Bridge</span></div>
  <div class="r"><span class="tag">H2 30</span><span class="samp" style="font-size:21px">The Itinerary</span></div>
  <div class="r"><span class="tag">H3 22</span><span class="samp" style="font-size:17px">The Crew</span></div>
  <div class="r"><span class="tag">BODY 16/19</span><span style="font-family:var(--font-body);font-size:16px;color:var(--fg-on-light-2)">We redefine what's possible in live experience.</span></div>
  <div class="r"><span class="tag">LABEL 12</span><span style="font-family:var(--font-pixel);font-size:12px;letter-spacing:.1em" class="px">EST. 2022 // MIAMI</span></div>
</div></body></html>
