<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0}.stage{width:700px;background:var(--ink);padding:30px 34px;box-sizing:border-box;display:flex;gap:46px}
.eb{font-family:var(--font-mono);font-size:12px;letter-spacing:.22em;color:var(--brass);text-transform:uppercase;margin:0 0 18px}
.row{display:flex;gap:20px;align-items:flex-end}
.cell{text-align:center}
.box{width:64px;height:64px;background:var(--brass);border:3px solid var(--bone)}
.l{font-family:var(--font-mono);font-size:11px;color:var(--fg-on-dark-2);margin-top:8px}
.shad{width:80px;height:60px;background:var(--nebula);border:3px solid var(--bone)}
</style></head>
<body><div class="stage">
  <div>
    <p class="eb">Radii · sharp</p>
    <div class="row">
      <div class="cell"><div class="box" style="border-radius:0"></div><div class="l">r-0 · 0</div></div>
      <div class="cell"><div class="box" style="border-radius:2px"></div><div class="l">r-1 · 2</div></div>
      <div class="cell"><div class="box" style="border-radius:4px"></div><div class="l">r-2 · 4</div></div>
      <div class="cell"><div class="box" style="border-radius:8px"></div><div class="l">r-3 · 8</div></div>
      <div class="cell"><div class="box" style="border-radius:999px"></div><div class="l">pill</div></div>
    </div>
  </div>
</div></body></html>
