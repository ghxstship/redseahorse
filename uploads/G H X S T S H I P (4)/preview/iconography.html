<!-- @dsCard group="Brand" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">
<style>html,body{margin:0}.stage{width:700px;background:var(--ink);padding:30px 34px;box-sizing:border-box}
.eb{font-family:var(--font-mono);font-size:12px;letter-spacing:.22em;color:var(--brass);text-transform:uppercase;margin:0 0 18px}
.row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.badge{width:62px;height:62px;display:grid;place-items:center;border:3px solid var(--bone);border-radius:50%;
  font-size:28px;box-shadow:4px 4px 0 var(--brass-deep)}
.b-brass{background:var(--brass);color:var(--ink)}
.b-nebula{background:var(--nebula);color:var(--bone);box-shadow:4px 4px 0 #B0741E}
.b-plasma{background:var(--plasma);color:var(--ink);box-shadow:4px 4px 0 #1E6FA3}
.b-ink{background:var(--ink-2);color:var(--bone)}
.plain{font-size:30px;color:var(--bone)}
.lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-on-dark-3);letter-spacing:.06em}
.plainrow{display:flex;gap:22px;align-items:center}
</style></head>
<body><div class="stage">
  <p class="eb">Iconography · Phosphor bold + skull glyph</p>
  <div class="row">
    <div class="badge b-brass"><i class="ph-bold ph-anchor"></i></div>
    <div class="badge b-nebula"><i class="ph-bold ph-compass"></i></div>
    <div class="badge b-plasma"><i class="ph-bold ph-megaphone-simple"></i></div>
    <div class="badge b-ink"><i class="ph-fill ph-lightning"></i></div>
    <div class="badge b-brass"><i class="ph-bold ph-ticket"></i></div>
    <div class="badge b-ink"><i class="ph-bold ph-globe-hemisphere-west"></i></div>
    <div class="badge b-nebula"><i class="ph-fill ph-shooting-star"></i></div>
  </div>
  <div class="plainrow">
    <i class="ph-bold ph-boat plain"></i>
    <i class="ph-bold ph-map-trifold plain"></i>
    <i class="ph-bold ph-path plain"></i>
    <i class="ph-bold ph-users-three plain"></i>
    <i class="ph-bold ph-wrench plain"></i>
    <i class="ph-bold ph-broadcast plain"></i>
    <i class="ph-bold ph-flag-banner plain"></i>
    <span class="lbl">+ skull glyph for brand moments</span>
  </div>
</div></body></html>
