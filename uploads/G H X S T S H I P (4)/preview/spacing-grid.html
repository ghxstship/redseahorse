<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0}.stage{width:700px;background:var(--bone);padding:30px 34px;box-sizing:border-box}
.eb{font-family:var(--font-mono);font-size:12px;letter-spacing:.22em;color:var(--brass-deep);text-transform:uppercase;margin:0 0 16px}
.r{display:flex;align-items:center;gap:14px;margin-bottom:9px}
.bar{height:18px;background:var(--nebula);border:2px solid var(--ink)}
.t{font-family:var(--font-mono);font-size:11px;color:var(--ink);width:96px;flex:none}
</style></head>
<body><div class="stage">
  <p class="eb">Spacing · 4px base grid</p>
  <div class="r"><span class="t">sp-1 · 4</span><div class="bar" style="width:4px"></div></div>
  <div class="r"><span class="t">sp-2 · 8</span><div class="bar" style="width:8px"></div></div>
  <div class="r"><span class="t">sp-3 · 12</span><div class="bar" style="width:12px"></div></div>
  <div class="r"><span class="t">sp-4 · 16</span><div class="bar" style="width:16px"></div></div>
  <div class="r"><span class="t">sp-5 · 24</span><div class="bar" style="width:24px"></div></div>
  <div class="r"><span class="t">sp-6 · 32</span><div class="bar" style="width:32px"></div></div>
  <div class="r"><span class="t">sp-7 · 48</span><div class="bar" style="width:48px"></div></div>
  <div class="r"><span class="t">sp-8 · 64</span><div class="bar" style="width:64px"></div></div>
  <div class="r"><span class="t">sp-9 · 96</span><div class="bar" style="width:96px"></div></div>
  <div class="r"><span class="t">sp-10 · 128</span><div class="bar" style="width:128px"></div></div>
</div></body></html>
