<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0}.stage{width:700px;background:var(--parchment);padding:36px 34px;box-sizing:border-box}
.eb{font-family:var(--font-mono);font-size:12px;letter-spacing:.22em;color:var(--brass-deep);text-transform:uppercase;margin:0 0 26px}
.row{display:flex;gap:34px;align-items:flex-start}
.cell{text-align:center}
.box{width:96px;height:64px;background:var(--bone);border:3px solid var(--ink);display:grid;place-items:center;
  font-family:var(--font-display);font-weight:800;color:var(--ink);text-transform:uppercase;font-size:13px}
.l{font-family:var(--font-mono);font-size:10px;color:var(--fg-on-light-3);margin-top:18px}
</style></head>
<body><div class="stage">
  <p class="eb">Hard offset "sticker" shadows · zero blur</p>
  <div class="row">
    <div class="cell"><div class="box" style="box-shadow:3px 3px 0 #101A1B">SM</div><div class="l">pop-sm · 3px</div></div>
    <div class="cell"><div class="box" style="box-shadow:6px 6px 0 #101A1B">POP</div><div class="l">pop · 6px</div></div>
    <div class="cell"><div class="box" style="box-shadow:10px 10px 0 #101A1B">LG</div><div class="l">pop-lg · 10px</div></div>
    <div class="cell"><div class="box" style="box-shadow:6px 6px 0 #B6772A;border-color:#B6772A">BRASS</div><div class="l">brass</div></div>
    <div class="cell"><div class="box" style="box-shadow:6px 6px 0 #B0741E">NEBULA</div><div class="l">nebula</div></div>
  </div>
</div></body></html>
