<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0}.stage{width:700px;background:var(--ink);padding:34px 40px;box-sizing:border-box}
.col{display:flex;gap:40px}
.eb{font-family:var(--font-mono);font-size:12px;letter-spacing:.24em;color:var(--plasma);text-transform:uppercase;margin:0 0 14px}
.px{font-family:var(--font-pixel);color:var(--brass);text-transform:uppercase}
.mn{font-family:var(--font-mono);color:var(--bone)}
.note{font-family:var(--font-mono);font-size:11px;color:var(--fg-on-dark-3);letter-spacing:.05em;margin-top:8px}
</style></head>
<body><div class="stage"><div class="col">
  <div style="flex:1">
    <p class="eb">Pixel · Silkscreen</p>
    <p class="px" style="font-size:30px;margin:0 0 10px">GHXSTSHIP</p>
    <p class="px" style="font-size:16px;margin:0">VENTURE BEYOND</p>
    <p class="note">8-BIT LABELS · CHIPS · EMPTY STATES · TIES TO THE GHOST-SHIP MARK</p>
  </div>
  <div style="flex:1">
    <p class="eb" style="color:var(--brass)">Mono · Space Mono</p>
    <p class="mn" style="font-size:22px;margin:0 0 8px">EST. 2022</p>
    <p class="mn" style="font-size:15px;letter-spacing:.08em;margin:0">MIAMI // LAS VEGAS // CHICAGO<br>NEW YORK // LOS ANGELES</p>
    <p class="note">COORDINATES · SPECS · MANIFEST METADATA · EYEBROWS</p>
  </div>
</div></div></body></html>
